name: お得情報巡回

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch: {}

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 依存パッケージインストール
        run: pip install -r requirements.txt

      - name: スクレイピング & 通知の実行
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python main.py

      - name: 通知済みデータと閲覧用データの変更をコミット
        run: |
          git config user.name "otoku-bot"
          git config user.email "otoku-bot@users.noreply.github.com"
          git add data/seen_items.json docs/deals.json
          git diff --staged --quiet || git commit -m "update deals data"
          git push
